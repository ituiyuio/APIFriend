<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APIFriend Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    @layer components {
      .liquid-glass {
        background: rgba(255,255,255,0.01);
        background-blend-mode: luminosity;
        backdrop-filter: blur(4px);
        border: none;
        box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
        position: relative;
        overflow: hidden;
      }

      .liquid-glass::before {
        content: '';
        position: absolute;
        inset: 0;
        padding: 1.4px;
        background: linear-gradient(180deg, 
          rgba(255,255,255,0.45) 0%, 
          rgba(255,255,255,0.15) 20%, 
          transparent 40%, 
          transparent 60%, 
          rgba(255,255,255,0.15) 80%, 
          rgba(255,255,255,0.45) 100%
        );
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        border-radius: inherit;
        pointer-events: none;
      }

      .liquid-glass-strong {
        background: rgba(255,255,255,0.02);
        background-blend-mode: luminosity;
        backdrop-filter: blur(50px);
        border: none;
        box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
        position: relative;
        overflow: hidden;
      }

      .liquid-glass-strong::before {
        content: '';
        position: absolute;
        inset: 0;
        padding: 1.4px;
        background: linear-gradient(180deg, 
          rgba(255,255,255,0.5) 0%, 
          rgba(255,255,255,0.2) 20%, 
          transparent 40%, 
          transparent 60%, 
          rgba(255,255,255,0.2) 80%, 
          rgba(255,255,255,0.5) 100%
        );
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        border-radius: inherit;
        pointer-events: none;
      }
    }

    :root {
      --radius: 1rem;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      color: white;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Gradient Background */
    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: 
        radial-gradient(ellipse at 0% 0%, rgba(120, 119, 198, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(255, 119, 115, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 0%, rgba(78, 205, 196, 0.08) 0%, transparent 40%),
        linear-gradient(180deg, #0c0c0c 0%, #111111 50%, #0a0a0a 100%);
    }

    /* Container */
    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      padding: 24px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 16px 24px;
      border-radius: 2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #4f8cff 0%, #a855f7 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 30px rgba(79, 140, 255, 0.4);
    }

    .logo-text h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.025em;
    }

    .logo-text p {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s ease;
      color: white;
      font-family: inherit;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f8cff 0%, #a855f7 100%);
      box-shadow: 0 4px 20px rgba(79, 140, 255, 0.4);
    }

    .btn-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 1200px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    .stat-card {
      padding: 24px;
      border-radius: 1.5rem;
      transition: transform 0.2s ease;
    }

    .stat-card:hover {
      transform: scale(1.02);
    }

    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 16px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 400;
    }

    /* Main Grid */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
    }

    @media (max-width: 1024px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Panels */
    .panel {
      padding: 24px;
      border-radius: 2rem;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .panel-title {
      font-size: 1rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-badge {
      padding: 6px 14px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
    }

    /* Source Cards */
    .source-card {
      padding: 20px;
      border-radius: 1.25rem;
      margin-bottom: 12px;
      transition: transform 0.2s ease;
    }

    .source-card:hover {
      transform: scale(1.01);
    }

    .source-card:last-child {
      margin-bottom: 0;
    }

    .source-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .source-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .source-priority {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #4f8cff 0%, #a855f7 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }

    .source-name {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .source-url {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.4);
      font-family: 'JetBrains Mono', monospace;
    }

    .source-status {
      padding: 6px 12px;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-enabled {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .status-cooling {
      background: rgba(245, 158, 11, 0.2);
      color: #f59e0b;
    }

    .status-disabled {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    /* Source Stats */
    .source-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .source-stat {
      text-align: center;
      padding: 12px 8px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }

    .source-stat-value {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .source-stat-label {
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Progress Bars */
    .rate-limit-section {
      margin-top: 12px;
    }

    .rate-limit-item {
      margin-bottom: 10px;
    }

    .rate-limit-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 0.75rem;
    }

    .rate-limit-label {
      color: rgba(255, 255, 255, 0.5);
    }

    .rate-limit-value {
      color: rgba(255, 255, 255, 0.8);
      font-family: 'JetBrains Mono', monospace;
    }

    .progress-bar {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .progress-fill.green {
      background: linear-gradient(90deg, #22c55e, #06b6d4);
    }

    .progress-fill.orange {
      background: linear-gradient(90deg, #f59e0b, #eab308);
    }

    .progress-fill.red {
      background: linear-gradient(90deg, #ef4444, #f59e0b);
    }

    /* Source Actions */
    .source-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
    }

    .action-btn {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s ease;
      font-family: inherit;
      color: rgba(255, 255, 255, 0.8);
    }

    .action-btn:hover {
      transform: scale(1.02);
    }

    .action-btn.danger {
      color: #ef4444;
    }

    /* Logs */
    .logs-container {
      height: 350px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      line-height: 1.8;
    }

    .log-entry {
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 4px;
      background: rgba(0, 0, 0, 0.3);
    }

    .log-time {
      color: rgba(255, 255, 255, 0.3);
      margin-right: 12px;
    }

    .log-level {
      font-weight: 600;
      margin-right: 12px;
    }

    .log-level.info { color: #4f8cff; }
    .log-level.warn { color: #f59e0b; }
    .log-level.error { color: #ef4444; }
    .log-level.debug { color: #a855f7; }

    .log-message {
      color: rgba(255, 255, 255, 0.6);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: rgba(255, 255, 255, 0.4);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: rgba(79, 140, 255, 0.8);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toast {
      padding: 16px 20px;
      border-radius: 1rem;
      animation: slideIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .toast.success { background: rgba(34, 197, 94, 0.2); }
    .toast.error { background: rgba(239, 68, 68, 0.2); }
    .toast.warning { background: rgba(245, 158, 11, 0.2); }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 2rem;
      transform: scale(0.9) translateY(20px);
      transition: all 0.3s ease;
    }

    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 500;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: transform 0.2s ease;
      color: rgba(255, 255, 255, 0.6);
      font-family: inherit;
    }

    .modal-close:hover {
      transform: scale(1.1);
      color: white;
    }

    .modal-body {
      padding: 0 24px 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
    }

    .form-label .required {
      color: #ef4444;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      color: white;
      font-size: 0.9rem;
      font-family: inherit;
      transition: all 0.2s ease;
      outline: none;
    }

    .form-input:focus {
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 2px rgba(79, 140, 255, 0.3);
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-hint {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 6px;
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      padding: 0 24px 24px;
    }

    .modal-footer .btn {
      flex: 1;
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    /* Chart Container */
    .chart-container {
      height: 120px;
      padding: 0 8px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 16px;
      }

      .header {
        flex-direction: column;
        gap: 16px;
        text-align: center;
        padding: 16px;
      }

      .header-actions {
        flex-wrap: wrap;
        justify-content: center;
      }

      .source-stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }

    /* SVG Icons */
    .icon {
      width: 18px;
      height: 18px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="gradient-bg"></div>
  
  <div class="container">
    <!-- Header -->
    <header class="header liquid-glass-strong">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">
          <h1>apifriend</h1>
          <p>API 中转路由管理面板</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openAddModal()">
          <span class="btn-icon">+</span> 添加源
        </button>
        <button class="btn liquid-glass" onclick="refreshAll()">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6"></path>
            <path d="M1 20v-6h6"></path>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          刷新
        </button>
        <button class="btn liquid-glass" onclick="reloadConfig()">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          重载
        </button>
        <button class="btn liquid-glass" onclick="resetAll()">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
          </svg>
          重置
        </button>
      </div>
    </header>

    <!-- Stats Overview -->
    <div class="stats-grid">
      <div class="stat-card liquid-glass-strong">
        <div class="stat-icon">📡</div>
        <div class="stat-value" id="total-requests">-</div>
        <div class="stat-label">总请求数</div>
      </div>
      <div class="stat-card liquid-glass-strong">
        <div class="stat-icon">✓</div>
        <div class="stat-value" id="success-rate">-</div>
        <div class="stat-label">成功率</div>
      </div>
      <div class="stat-card liquid-glass-strong">
        <div class="stat-icon">🔌</div>
        <div class="stat-value" id="active-sources">-</div>
        <div class="stat-label">活跃源</div>
      </div>
      <div class="stat-card liquid-glass-strong">
        <div class="stat-icon">⏱</div>
        <div class="stat-value" id="uptime">-</div>
        <div class="stat-label">运行时间</div>
      </div>
    </div>

    <!-- Request Trends Chart -->
    <div class="panel liquid-glass-strong" style="margin-bottom: 24px;">
      <div class="panel-header">
        <span class="panel-title">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 20V10"></path>
            <path d="M12 20V4"></path>
            <path d="M6 20v-6"></path>
          </svg>
          请求趋势（最近24小时）
        </span>
        <span class="panel-badge" id="chart-requests">0 请求</span>
      </div>
      <div style="padding: 20px;">
        <canvas id="trend-chart" style="width: 100%; height: 140px;"></canvas>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-grid">
      <!-- Sources Panel -->
      <div class="panel liquid-glass-strong">
        <div class="panel-header">
          <span class="panel-title">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
            </svg>
            API 源状态
          </span>
          <span class="panel-badge" id="sources-count">0 个源</span>
        </div>
        <div id="sources-container">
          <div class="loading">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <!-- Right Sidebar -->
      <div style="display: flex; flex-direction: column; gap: 24px;">
        <!-- Health Panel -->
        <div class="panel liquid-glass-strong">
          <div class="panel-header">
            <span class="panel-title">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
              </svg>
              系统健康
            </span>
            <span class="panel-badge" id="health-status" style="background: rgba(34, 197, 94, 0.2); color: #22c55e;">健康</span>
          </div>
          <div id="health-container">
            <div class="loading">
              <div class="spinner"></div>
            </div>
          </div>
        </div>

        <!-- Logs Panel -->
        <div class="panel liquid-glass-strong">
          <div class="panel-header">
            <span class="panel-title">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
              实时日志
            </span>
            <button class="btn liquid-glass" style="padding: 6px 12px; font-size: 12px;" onclick="clearLogs()">清除</button>
          </div>
          <div class="logs-container" id="logs-container">
            <div class="empty-state">
              <div class="empty-icon">📋</div>
              <p>暂无日志</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal liquid-glass-strong">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">添加 API 源</span>
        <button class="modal-close liquid-glass" onclick="closeModal()">✕</button>
      </div>
      <form id="source-form" onsubmit="event.preventDefault(); saveSource();">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">源名称 <span class="required">*</span></label>
            <input type="text" class="form-input" id="source-name" placeholder="例如: openrouter-free" required>
            <div class="form-hint">唯一标识符，创建后不可修改</div>
          </div>
          <div class="form-group">
            <label class="form-label">Base URL <span class="required">*</span></label>
            <input type="text" class="form-input" id="source-baseurl" placeholder="例如: https://api.openai.com/v1" required>
          </div>
          <div class="form-group">
            <label class="form-label">API Key</label>
            <input type="password" class="form-input" id="source-apikey" placeholder="sk-xxxxx">
            <div class="form-hint">编辑时留空表示保持不变</div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">优先级</label>
              <input type="number" class="form-input" id="source-priority" value="100" min="1" max="999">
              <div class="form-hint">数字越小优先级越高</div>
            </div>
            <div class="form-group">
              <label class="form-label">默认模型</label>
              <input type="text" class="form-input" id="source-model" placeholder="例如: gpt-4">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">RPM (请求/分钟)</label>
              <input type="number" class="form-input" id="source-rpm" placeholder="例如: 60" min="1">
            </div>
            <div class="form-group">
              <label class="form-label">TPM (Token/分钟)</label>
              <input type="number" class="form-input" id="source-tpm" placeholder="例如: 10000" min="1">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger liquid-glass" id="delete-btn" onclick="deleteSource()" style="display: none;">
            删除源
          </button>
          <button type="button" class="btn liquid-glass" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script>
    const API_BASE = '/admin';
    let refreshInterval;
    let serverConnected = true;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      refreshAll();
      startAutoRefresh();
      
      // Close modal on overlay click
      document.getElementById('modal-overlay').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeModal();
      });
    });

    // Auto refresh every 5 seconds
    function startAutoRefresh() {
      refreshInterval = setInterval(() => {
        checkConnection();
        fetchStats();
        fetchSources();
      }, 5000);
    }

    // Check server connection
    async function checkConnection() {
      try {
        const res = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(3000) });
        if (!res.ok) throw new Error('Server error');
        
        if (!serverConnected) {
          serverConnected = true;
          addLog('info', '服务器已恢复，刷新页面...');
          setTimeout(() => location.reload(), 500);
        }
      } catch (err) {
        if (serverConnected) {
          serverConnected = false;
          addLog('error', '服务器连接断开，等待重连...');
        }
      }
    }

    // Fetch all data
    async function refreshAll() {
      await Promise.all([
        fetchStats(),
        fetchSources(),
        fetchHealth(),
        fetchStatsHistory()
      ]);
      addLog('info', '数据已刷新');
    }

    // Fetch statistics
    async function fetchStats() {
      try {
        const res = await fetch(`${API_BASE}/stats`);
        const data = await res.json();
        
        if (data.success) {
          const stats = data.data;
          document.getElementById('total-requests').textContent = stats.requests.total.toLocaleString();
          document.getElementById('success-rate').textContent = stats.requests.successRate;
          document.getElementById('active-sources').textContent = stats.sources.enabled;
          document.getElementById('sources-count').textContent = `${stats.sources.total} 个源`;
        }
      } catch (err) {
        console.error('Failed to fetch stats:', err);
      }
    }

    // Fetch sources
    async function fetchSources() {
      try {
        const res = await fetch(`${API_BASE}/sources?_t=${Date.now()}`);
        const data = await res.json();
        
        if (data.success) {
          renderSources(data.data);
        }
      } catch (err) {
        console.error('Failed to fetch sources:', err);
        document.getElementById('sources-container').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">❌</div>
            <p>无法加载源数据</p>
          </div>
        `;
      }
    }

    // Render sources
    function renderSources(sources) {
      const container = document.getElementById('sources-container');
      
      if (!sources.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📡</div>
            <p>暂无配置的 API 源</p>
          </div>
        `;
        return;
      }
      
      sources.sort((a, b) => (a.priority || 999) - (b.priority || 999));

      container.innerHTML = sources.map(source => {
        const statusClass = `status-${source.status}`;
        const statusText = {
          'enabled': '正常',
          'cooling': '冷却中',
          'disabled': '已禁用'
        }[source.status] || source.status;
        
        const rateLimit = source.rateLimit || {};
        const stats = source.stats || {};

        const rpmCurrent = rateLimit.current?.requests?.minuteCount || rateLimit.current?.minuteCount || 0;
        const tpmCurrent = rateLimit.current?.tokens?.minuteCount || 0;
        const rpmPercent = rateLimit.config?.requestsPerMinute 
          ? Math.min(100, rpmCurrent / rateLimit.config.requestsPerMinute * 100)
          : 0;
        const tpmPercent = rateLimit.config?.tokensPerMinute 
          ? Math.min(100, tpmCurrent / rateLimit.config.tokensPerMinute * 100)
          : 0;

        const getProgressClass = (percent) => {
          if (percent < 50) return 'green';
          if (percent < 80) return 'orange';
          return 'red';
        };

        return `
          <div class="source-card liquid-glass">
            <div class="source-header">
              <div class="source-info">
                <div class="source-priority">${source.priority}</div>
                <div>
                  <div class="source-name">${source.name}</div>
                  <div class="source-url">${source.baseUrl}</div>
                  ${source.modelMapping?.default ? `<div style="font-size: 11px; color: rgba(6, 182, 212, 0.8); margin-top: 2px;">模型: ${source.modelMapping.default}</div>` : ''}
                </div>
              </div>
              <span class="source-status ${statusClass}">${statusText}</span>
            </div>
            
            <div class="source-stats">
              <div class="source-stat">
                <div class="source-stat-value">${stats.totalRequests || 0}</div>
                <div class="source-stat-label">请求数</div>
              </div>
              <div class="source-stat">
                <div class="source-stat-value" style="color: #22c55e;">${stats.successCount || 0}</div>
                <div class="source-stat-label">成功</div>
              </div>
              <div class="source-stat">
                <div class="source-stat-value" style="color: #ef4444;">${stats.failureCount || 0}</div>
                <div class="source-stat-label">失败</div>
              </div>
              <div class="source-stat">
                <div class="source-stat-value">${stats.consecutiveFailures || 0}</div>
                <div class="source-stat-label">连续失败</div>
              </div>
            </div>
            
            ${stats.avgLatency ? `
              <div style="font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-bottom: 12px;">
                平均延迟: <span style="color: rgba(255,255,255,0.8);">${Math.round(stats.avgLatency)}ms</span>
                ${stats.totalTokens ? ` · Token: <span style="color: rgba(255,255,255,0.8);">${stats.totalTokens.toLocaleString()}</span>` : ''}
              </div>
            ` : ''}
            
            ${stats.lastError ? `
              <div style="font-size: 0.7rem; color: rgba(239, 68, 68, 0.8); margin-bottom: 12px; padding: 8px 12px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; border-left: 3px solid rgba(239, 68, 68, 0.5);">
                <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                  <span style="font-weight: 600;">最后错误</span>
                  <span style="color: rgba(255,255,255,0.4);">${new Date(stats.lastError.timestamp).toLocaleTimeString('zh-CN')}</span>
                </div>
                <div style="color: rgba(255,255,255,0.6);">
                  ${stats.lastError.statusCode ? `<span style="color: #f59e0b;">[${stats.lastError.statusCode}]</span> ` : ''}
                  ${stats.lastError.message || stats.lastError.type || '未知错误'}
                </div>
              </div>
            ` : ''}
            
            ${(rateLimit.config?.requestsPerMinute || rateLimit.config?.tokensPerMinute) ? `
              <div class="rate-limit-section">
                ${rateLimit.config.requestsPerMinute ? `
                  <div class="rate-limit-item">
                    <div class="rate-limit-header">
                      <span class="rate-limit-label">RPM</span>
                      <span class="rate-limit-value">${rpmCurrent} / ${rateLimit.config.requestsPerMinute}</span>
                    </div>
                    <div class="progress-bar">
                      <div class="progress-fill ${getProgressClass(rpmPercent)}" style="width: ${rpmPercent}%"></div>
                    </div>
                  </div>
                ` : ''}
                ${rateLimit.config.tokensPerMinute ? `
                  <div class="rate-limit-item">
                    <div class="rate-limit-header">
                      <span class="rate-limit-label">TPM</span>
                      <span class="rate-limit-value">${tpmCurrent.toLocaleString()} / ${rateLimit.config.tokensPerMinute.toLocaleString()}</span>
                    </div>
                    <div class="progress-bar">
                      <div class="progress-fill ${getProgressClass(tpmPercent)}" style="width: ${tpmPercent}%"></div>
                    </div>
                  </div>
                ` : ''}
              </div>
            ` : ''}
            
            <div class="source-actions">
              <button class="action-btn liquid-glass" onclick="openEditModal('${source.name}')">编辑</button>
              <button class="action-btn liquid-glass" onclick="toggleSource('${source.name}')">${source.status === 'enabled' ? '禁用' : '启用'}</button>
              <button class="action-btn liquid-glass" onclick="resetSource('${source.name}')">重置</button>
              <button class="action-btn danger liquid-glass" onclick="testSource('${source.name}')">测试</button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Fetch health
    async function fetchHealth() {
      try {
        const res = await fetch(`${API_BASE}/health`);
        const data = await res.json();
        
        if (data.success) {
          document.getElementById('health-status').textContent = data.status === 'healthy' ? '健康' : '异常';
          document.getElementById('health-status').style.background = data.status === 'healthy' ? 'rgba(34, 197, 94, 0.2)' : 'rgba(239, 68, 68, 0.2)';
          document.getElementById('health-status').style.color = data.status === 'healthy' ? '#22c55e' : '#ef4444';
          document.getElementById('uptime').textContent = formatUptime(data.uptime);
          document.getElementById('health-container').innerHTML = `
            <div style="padding: 8px 0;">
              <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span style="color: rgba(255,255,255,0.6);">状态</span>
                <span style="color: ${data.status === 'healthy' ? '#22c55e' : '#ef4444'};">${data.status === 'healthy' ? '正常运行' : '异常'}</span>
              </div>
              <div style="display: flex; justify-content: space-between;">
                <span style="color: rgba(255,255,255,0.6);">启动时间</span>
                <span style="color: rgba(255,255,255,0.8);">${new Date(data.startTime).toLocaleString('zh-CN')}</span>
              </div>
            </div>
          `;
        }
      } catch (err) {
        console.error('Failed to fetch health:', err);
        document.getElementById('health-container').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">❌</div>
            <p>无法获取健康状态</p>
          </div>
        `;
      }
    }

    // Format uptime
    function formatUptime(seconds) {
      if (!seconds) return '-';
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      if (hours > 24) {
        const days = Math.floor(hours / 24);
        return `${days}天 ${hours % 24}时`;
      }
      if (hours > 0) return `${hours}时 ${minutes}分`;
      return `${minutes}分`;
    }

    // Fetch stats history for chart
    async function fetchStatsHistory() {
      try {
        const res = await fetch(`${API_BASE}/stats/history?hours=24`);
        const data = await res.json();
        
        if (data.success) {
          drawChart(data.data.hourly);
          const total = data.data.hourly.reduce((sum, h) => sum + h.totalRequests, 0);
          document.getElementById('chart-requests').textContent = `${total.toLocaleString()} 请求`;
        }
      } catch (err) {
        console.error('Failed to fetch stats history:', err);
      }
    }

    // Draw trend chart
    function drawChart(hourlyData) {
      const canvas = document.getElementById('trend-chart');
      if (!canvas) return;
      
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      
      const width = rect.width;
      const height = rect.height;
      const padding = { top: 10, right: 10, bottom: 25, left: 35 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;
      
      // Clear
      ctx.clearRect(0, 0, width, height);
      
      if (!hourlyData || hourlyData.length === 0) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.font = '12px Poppins';
        ctx.textAlign = 'center';
        ctx.fillText('暂无数据', width / 2, height / 2);
        return;
      }
      
      const maxRequests = Math.max(...hourlyData.map(h => h.totalRequests || 0), 1);
      const barWidth = chartWidth / hourlyData.length - 2;
      
      // Draw bars
      hourlyData.forEach((hour, i) => {
        const x = padding.left + i * (chartWidth / hourlyData.length) + 1;
        const barHeight = ((hour.totalRequests || 0) / maxRequests) * chartHeight;
        const y = padding.top + chartHeight - barHeight;
        
        // Bar gradient
        const gradient = ctx.createLinearGradient(x, y, x, y + barHeight);
        gradient.addColorStop(0, 'rgba(79, 140, 255, 0.6)');
        gradient.addColorStop(1, 'rgba(168, 85, 247, 0.3)');
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(x, y, barWidth, barHeight, 3);
        ctx.fill();
      });
      
      // Draw axis labels
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.font = '10px Poppins';
      
      // Y axis
      ctx.textAlign = 'right';
      for (let i = 0; i <= 3; i++) {
        const y = padding.top + chartHeight - (i / 3) * chartHeight;
        ctx.fillText(Math.round(maxRequests * i / 3), padding.left - 5, y + 3);
      }
      
      // X axis (hours)
      ctx.textAlign = 'center';
      const labelInterval = Math.ceil(hourlyData.length / 6);
      hourlyData.forEach((hour, i) => {
        if (i % labelInterval === 0) {
          const x = padding.left + i * (chartWidth / hourlyData.length) + barWidth / 2;
          ctx.fillText(`${hour.hour}:00`, x, height - 5);
        }
      });
    }

    // Modal functions
    function openAddModal() {
      document.getElementById('modal-title').textContent = '添加 API 源';
      document.getElementById('source-form').reset();
      document.getElementById('source-name').disabled = false;
      document.getElementById('delete-btn').style.display = 'none';
      document.getElementById('modal-overlay').classList.add('active');
    }

    async function openEditModal(name) {
      try {
        const res = await fetch(`${API_BASE}/sources/${name}`);
        const data = await res.json();
        
        if (data.success) {
          const source = data.data;
          document.getElementById('modal-title').textContent = '编辑 API 源';
          document.getElementById('source-name').value = source.name;
          document.getElementById('source-name').disabled = true;
          document.getElementById('source-baseurl').value = source.baseUrl;
          document.getElementById('source-apikey').value = '';
          document.getElementById('source-priority').value = source.priority || 100;
          document.getElementById('source-model').value = source.modelMapping?.default || '';
          document.getElementById('source-rpm').value = source.rateLimit?.config?.requestsPerMinute || '';
          document.getElementById('source-tpm').value = source.rateLimit?.config?.tokensPerMinute || '';
          document.getElementById('delete-btn').style.display = 'block';
          document.getElementById('modal-overlay').classList.add('active');
        }
      } catch (err) {
        showToast('加载源数据失败', 'error');
      }
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
    }

    // Save source
    async function saveSource() {
      const name = document.getElementById('source-name').value.trim();
      const baseUrl = document.getElementById('source-baseurl').value.trim();
      const apiKey = document.getElementById('source-apikey').value.trim();
      const priority = parseInt(document.getElementById('source-priority').value) || 100;
      const model = document.getElementById('source-model').value.trim();
      const rpm = parseInt(document.getElementById('source-rpm').value) || null;
      const tpm = parseInt(document.getElementById('source-tpm').value) || null;

      const isEdit = document.getElementById('source-name').disabled;
      const url = isEdit ? `${API_BASE}/sources/${name}` : `${API_BASE}/sources`;
      const method = isEdit ? 'PUT' : 'POST';

      const body = {
        name,
        baseUrl,
        priority,
        modelMapping: model ? { default: model } : undefined,
        rateLimit: (rpm || tpm) ? {
          config: {
            requestsPerMinute: rpm,
            tokensPerMinute: tpm
          }
        } : undefined
      };

      if (apiKey) body.apiKey = apiKey;

      try {
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        
        if (data.success) {
          showToast(isEdit ? '源已更新' : '源已添加', 'success');
          closeModal();
          fetchSources();
        } else {
          showToast(data.error?.message || '操作失败', 'error');
        }
      } catch (err) {
        showToast('请求失败', 'error');
      }
    }

    // Delete source
    async function deleteSource() {
      const name = document.getElementById('source-name').value;
      if (!confirm(`确定要删除源 "${name}" 吗？`)) return;

      try {
        const res = await fetch(`${API_BASE}/sources/${name}`, { method: 'DELETE' });
        const data = await res.json();
        
        if (data.success) {
          showToast('源已删除', 'success');
          closeModal();
          fetchSources();
        } else {
          showToast(data.error?.message || '删除失败', 'error');
        }
      } catch (err) {
        showToast('请求失败', 'error');
      }
    }

    // Toggle source
    async function toggleSource(name) {
      try {
        const res = await fetch(`${API_BASE}/sources/${name}/toggle`, { method: 'POST' });
        const data = await res.json();
        
        if (data.success) {
          showToast('状态已切换', 'success');
          fetchSources();
        } else {
          showToast(data.error?.message || '操作失败', 'error');
        }
      } catch (err) {
        showToast('请求失败', 'error');
      }
    }

    // Reset source
    async function resetSource(name) {
      try {
        const res = await fetch(`${API_BASE}/sources/${name}/reset`, { method: 'POST' });
        const data = await res.json();
        
        if (data.success) {
          showToast('统计已重置', 'success');
          fetchSources();
        } else {
          showToast(data.error?.message || '操作失败', 'error');
        }
      } catch (err) {
        showToast('请求失败', 'error');
      }
    }

    // Test source
    async function testSource(name) {
      showToast('正在测试...', 'warning');
      try {
        const res = await fetch(`${API_BASE}/sources/${name}/test`, { method: 'POST' });
        const data = await res.json();
        
        if (data.success) {
          showToast('测试成功', 'success');
        } else {
          showToast(data.error?.message || '测试失败', 'error');
        }
      } catch (err) {
        showToast('请求失败', 'error');
      }
    }

    // Reload config
    async function reloadConfig() {
      try {
        const res = await fetch(`${API_BASE}/config/reload`, { method: 'POST' });
        const data = await res.json();
        
        if (data.success) {
          showToast('配置已重载', 'success');
          fetchSources();
        } else {
          showToast(data.error?.message || '重载失败', 'error');
        }
      } catch (err) {
        showToast('请求失败', 'error');
      }
    }

    // Reset all stats
    async function resetAll() {
      if (!confirm('确定要重置所有统计数据吗？')) return;
      
      try {
        const res = await fetch(`${API_BASE}/stats/reset`, { method: 'POST' });
        const data = await res.json();
        
        if (data.success) {
          showToast('统计已重置', 'success');
          refreshAll();
        } else {
          showToast(data.error?.message || '重置失败', 'error');
        }
      } catch (err) {
        showToast('请求失败', 'error');
      }
    }

    // Add log
    function addLog(level, message) {
      const container = document.getElementById('logs-container');
      const empty = container.querySelector('.empty-state');
      if (empty) empty.remove();
      
      const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      const entry = document.createElement('div');
      entry.className = 'log-entry liquid-glass';
      entry.innerHTML = `
        <span class="log-time">${time}</span>
        <span class="log-level ${level}">${level.toUpperCase()}</span>
        <span class="log-message">${message}</span>
      `;
      container.appendChild(entry);
      container.scrollTop = container.scrollHeight;
      
      // Limit log entries
      while (container.children.length > 100) {
        container.removeChild(container.firstChild);
      }
    }

    // Clear logs
    function clearLog() {
      const container = document.getElementById('logs-container');
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>暂无日志</p>
        </div>
      `;
    }

    // Toast notification
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast liquid-glass-strong ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
  </script>
</body>
</html>
